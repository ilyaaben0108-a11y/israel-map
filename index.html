<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכ"ם התראות - מצב כהה (Dark Mode)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* רקע כללי שחור עמוק */
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #eee; }
        
        /* המפה הכהה - הפכנו את הצבעים */
        #map { 
            height: 100vh; 
            width: 100%; 
            filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.1); 
            background: #000;
        }
        
        /* פאנל התראות מעוצב בשחור */
        .panel {
            position: absolute; top: 15px; right: 15px; z-index: 9999;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #ff4d4d; /* גבול אדום דק */
            padding: 15px; border-radius: 8px; width: 260px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); /* הילה אדומה עדינה */
            text-align: center;
        }
        
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: #aaa; font-size: 13px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #444; }
        .active-red { background: #ff0000; box-shadow: 0 0 10px #ff0000; animation: blink 0.5s infinite; }
        .active-green { background: #00ff00; box-shadow: 0 0 8px rgba(0, 255, 0, 0.4); }

        @keyframes blink { 50% { opacity: 0.2; } }
        
        #alert-list { font-size: 18px; color: #ff4d4d; font-weight: bold; min-height: 40px; }
        .red-text { color: #ff0000 !important; text-shadow: 0 0 10px #ff0000; }
        .white-text { color: #ffffff !important; font-weight: bold; }
        
        #last-alert-info { font-size: 11px; color: #666; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="status-row">
            <div id="dot" class="dot"></div> 
            <span id="status">סורק...</span>
        </div>
        <div id="alert-list" class="white-text">ממתין להתראות...</div>
        <div id="last-alert-info">טוען היסטוריה...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // אתחול המפה על ישראל
        const map = L.map('map', { zoomControl: false }).setView([31.5, 34.8], 8);
        
        // טעינת מפה בסיסית (תהפוך לכהה ע"י הפילטר)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function fetchAlerts() {
            try {
                // משיכת נתונים דרך מתווך (עוקף חסימות CORS)
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.oref.org.il/WarningMessages/History/AlertsHistory.json?t=' + Date.now()));
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);
                
                const dot = document.getElementById('dot');
                const alertList = document.getElementById('alert-list');
                const status = document.getElementById('status');
                const info = document.getElementById('last-alert-info');

                status.innerText = "מחובר למכ"ם";
                status.style.color = "#00ff00"; // ירוק כשהוא מחובר

                if (data && data.length > 0) {
                    const latest = data[0];
                    dot.className = "dot active-red";
                    alertList.innerText = "צבע אדום: " + latest.data;
                    alertList.classList.remove('white-text');
                    alertList.classList.add('red-text');
                    
                    info.innerText = "אחרון: " + latest.data + " (" + latest.alertDate.split(' ')[1] + ")";
                } else {
                    dot.className = "dot active-green";
                    alertList.innerText = "השמיים שקטים";
                    alertList.classList.remove('red-text');
                    alertList.classList.add('white-text');
                    info.innerText = "ממתין להתראה...";
                }
            } catch (e) {
                document.getElementById('status').innerText = "ניסיון חיבור חוזר...";
                document.getElementById('status').style.color = "#f39c12"; // כתום בשגיאה
            }
        }

        setInterval(fetchAlerts, 4000); // בדיקה כל 4 שניות
        fetchAlerts();
    </script>
</body>
</html>
