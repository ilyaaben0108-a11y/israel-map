<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת התרעות - גרסה לבנה</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* איפוס הגדרות כדי למנוע רקע שחור */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ffffff !important; /* לבן מוחלט */
        }

        #map {
            height: 100vh;
            width: 100%;
            background-color: #ffffff; /* מבטיח שהדיב עצמו לבן */
        }

        .map-title {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="map-title">מערכת התרעות בזמן אמת</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // יצירת המפה עם הגדרות צבע בהיר
        const map = L.map('map').setView([31.5, 34.9], 8);

        // שימוש בטיילס הלבנים של Positron
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // פונקציה להצגת התרעה (עיגול אדום מהבהב)
        function createAlert(lat, lng, locationName) {
            const alertCircle = L.circle([lat, lng], {
                color: 'red',
                fillColor: '#ff0000',
                fillOpacity: 0.5,
                radius: 4000
            }).addTo(map);

            alertCircle.bindPopup("<b>צבע אדום:</b> " + locationName).openPopup();
        }

        // דוגמה להתרעה שתופיע מיד כדי שתראה שזה עובד
        createAlert(32.0853, 34.7818, "תל אביב - דוגמה");

    </script>
</body>
</html>
