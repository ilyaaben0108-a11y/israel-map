    <title>מפת התרעות בסגנון פיקוד העורף</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
            background-color: #1a1a1a; /* רקע כהה כמו באתרים דומים */
        }

        .map-title {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="map-title">מפת התרעות בזמן אמת</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // יצירת המפה ומרכוז על ישראל
        const map = L.map('map').setView([31.5, 34.9], 8);

        // הוספת שכבת מפה (Dark Mode בסגנון Siren)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);
