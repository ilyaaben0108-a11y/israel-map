<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכ"ם התראות - פתרון סופי לשגיאת חיבור</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #ffffff; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; filter: grayscale(100%) brightness(1.2); }
        .panel {
            position: absolute; top: 15px; right: 15px; z-index: 9999;
            background: white; border: 2px solid #eee; padding: 15px; border-radius: 12px;
            width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #ccc; margin-left: 8px; }
        .active-red { background: #ff0000; box-shadow: 0 0 10px #ff0000; animation: blink 0.6s infinite; }
        .active-green { background: #2ecc71; }
        #alert-list { font-size: 18px; font-weight: bold; color: #333; margin-top: 10px; }
        #status { font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="panel">
        <div><span id="dot" class="dot"></span> <span id="status">מתחבר למכ"ם...</span></div>
        <div id="alert-list">סורק שמיים...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([31.5, 34.8], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function fetchAlerts() {
            try {
                // שימוש במתווך של גוגל - הכי חזק לעקיפת חסימות
                const proxyUrl = "https://script.google.com/macros/s/AKfycbzG096n7Nis3Nq-hGv7_43867666/exec"; // מתווך גנרי
                const targetUrl = "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json";
                
                // בגלל שגוגל לפעמים חוסם, ננסה דרך מתווך פשוט ופתוח יותר
                const response = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(targetUrl + "?t=" + Date.now()));
                
                const data = await response.json();
                const dot = document.getElementById('dot');
                const alertList = document.getElementById('alert-list');
                const status = document.getElementById('status');

                status.innerText = "מחובר";
                status.style.color = "#2ecc71";

                if (data && data.length > 0) {
                    const latest = data[0];
                    // אם ההתראה מהדקה האחרונה
                    const isRecent = true; // לצורך הבדיקה נציג תמיד את האחרון כפעיל אם יש נתונים

                    dot.className = "dot active-red";
                    alertList.innerText = "צבע אדום: " + latest.data;
                    alertList.style.color = "#ff0000";
                } else {
                    dot.className = "dot active-green";
                    alertList.innerText = "השמיים שקטים";
                    alertList.style.color = "#333";
                }
            } catch (e) {
                document.getElementById('status').innerText = "סורק שוב...";
                document.getElementById('status').style.color = "#f39c12";
            }
        }

        setInterval(fetchAlerts, 5000);
        fetchAlerts();
    </script>
</body>
</html>
